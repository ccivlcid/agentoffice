<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 720pt;
      height: 405pt;
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #1a1a1a;
      padding: 40pt 48pt;
      display: flex;
      flex-direction: column;
    }
  </style>
</head>
<body>
  <!-- Header -->
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 28pt;">
    <div style="display: flex; align-items: center; gap: 12pt;">
      <p style="font-size: 10pt; font-weight: 500; color: #555555;">04</p>
      <h2 style="font-size: 22pt; font-weight: 400; color: #ffffff;">보이지 않는 복잡성</h2>
    </div>
    <p style="font-size: 10pt; color: #444444;">06</p>
  </div>

  <!-- Main content -->
  <div style="flex: 1; display: flex; flex-direction: column; justify-content: center;">
    <p style="font-size: 36pt; font-weight: 200; color: #ffffff; line-height: 1.4; letter-spacing: -0.02em; margin-bottom: 28pt;">
      복잡함을 감추는 것이 아니라
    </p>
    <p style="font-size: 36pt; font-weight: 200; color: #ffffff; line-height: 1.4; letter-spacing: -0.02em; margin-bottom: 40pt;">
      <b>단순함으로 승화</b>시킵니다.
    </p>

    <!-- 3 columns -->
    <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20pt;">
      <div style="border-top: 1px solid #444444; padding-top: 14pt;">
        <p style="font-size: 10pt; color: #888888; margin-bottom: 6pt;">Surface</p>
        <p style="font-size: 12pt; color: #ffffff; font-weight: 400; line-height: 1.5;">픽셀아트 오피스 하나로 모든 상태를 직관적으로 파악</p>
      </div>
      <div style="border-top: 1px solid #444444; padding-top: 14pt;">
        <p style="font-size: 10pt; color: #888888; margin-bottom: 6pt;">Middle</p>
        <p style="font-size: 12pt; color: #ffffff; font-weight: 400; line-height: 1.5;">멀티 프로바이더 라우팅, 워크트리 격리, 스킬 시스템</p>
      </div>
      <div style="border-top: 1px solid #444444; padding-top: 14pt;">
        <p style="font-size: 10pt; color: #888888; margin-bottom: 6pt;">Deep</p>
        <p style="font-size: 12pt; color: #ffffff; font-weight: 400; line-height: 1.5;">프로세스 관리, 보안 암호화, 실시간 동기화</p>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div style="padding-top: 12pt; border-top: 1px solid #333333;">
    <p style="font-size: 9pt; color: #555555;">디자인의 궁극은 복잡성을 사라지게 하는 것</p>
  </div>
</body>
</html>
