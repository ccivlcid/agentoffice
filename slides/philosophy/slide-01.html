<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 720pt;
      height: 405pt;
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #fafaf8;
      padding: 48pt;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
  </style>
</head>
<body>
  <!-- Top accent line -->
  <div style="width: 40pt; height: 3pt; background: #1a1a1a; border-radius: 2pt;"></div>

  <!-- Main Title -->
  <div>
    <p style="font-size: 11pt; font-weight: 500; color: #999999; letter-spacing: 0.08em; margin-bottom: 20pt;">OUR PHILOSOPHY</p>
    <h1 style="font-size: 52pt; font-weight: 300; color: #1a1a1a; letter-spacing: -0.03em; line-height: 1.15;">
      <b>AI</b>와 함께 일한다는 것의
    </h1>
    <h1 style="font-size: 52pt; font-weight: 300; color: #1a1a1a; letter-spacing: -0.03em; line-height: 1.15;">
      <b>본질</b>에 대하여
    </h1>
    <p style="font-size: 15pt; color: #888888; margin-top: 24pt; line-height: 1.6; max-width: 420pt; font-weight: 300;">
      복잡한 것을 단순하게, 단순한 것을 의미있게.
    </p>
  </div>

  <!-- Footer -->
  <div style="display: flex; justify-content: space-between; align-items: flex-end;">
    <div>
      <p style="font-size: 9pt; color: #bbbbbb; letter-spacing: 0.02em;">HyperClaw</p>
    </div>
    <p style="font-size: 9pt; color: #bbbbbb;">March 2026</p>
  </div>
</body>
</html>
