<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 720pt;
      height: 405pt;
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #ffffff;
      padding: 40pt 48pt;
      display: flex;
      flex-direction: column;
    }
  </style>
</head>
<body>
  <!-- Header -->
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20pt;">
    <div style="display: flex; align-items: center; gap: 12pt;">
      <p style="font-size: 10pt; font-weight: 500; color: #bbbbbb;">07</p>
      <h2 style="font-size: 22pt; font-weight: 400; color: #1a1a1a;">핵심 가치</h2>
    </div>
    <p style="font-size: 10pt; color: #cccccc;">09</p>
  </div>

  <!-- Values grid -->
  <div style="flex: 1; display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: 1fr 1fr; gap: 14pt;">
    <div style="background: #fafaf8; border-radius: 8pt; padding: 18pt; display: flex; flex-direction: column; justify-content: space-between;">
      <p style="font-size: 24pt; font-weight: 200; color: #1a1a1a;">01</p>
      <div>
        <p style="font-size: 13pt; font-weight: 500; color: #1a1a1a; margin-bottom: 4pt;">협업</p>
        <p style="font-size: 9pt; color: #888888; line-height: 1.5;">AI와 인간이 동등한 파트너로서 함께 성장</p>
      </div>
    </div>

    <div style="background: #fafaf8; border-radius: 8pt; padding: 18pt; display: flex; flex-direction: column; justify-content: space-between;">
      <p style="font-size: 24pt; font-weight: 200; color: #1a1a1a;">02</p>
      <div>
        <p style="font-size: 13pt; font-weight: 500; color: #1a1a1a; margin-bottom: 4pt;">자율</p>
        <p style="font-size: 9pt; color: #888888; line-height: 1.5;">로컬 환경에서 완전한 통제와 소유권</p>
      </div>
    </div>

    <div style="background: #fafaf8; border-radius: 8pt; padding: 18pt; display: flex; flex-direction: column; justify-content: space-between;">
      <p style="font-size: 24pt; font-weight: 200; color: #1a1a1a;">03</p>
      <div>
        <p style="font-size: 13pt; font-weight: 500; color: #1a1a1a; margin-bottom: 4pt;">단순</p>
        <p style="font-size: 9pt; color: #888888; line-height: 1.5;">복잡한 기술을 직관적 인터페이스로</p>
      </div>
    </div>

    <div style="background: #fafaf8; border-radius: 8pt; padding: 18pt; display: flex; flex-direction: column; justify-content: space-between;">
      <p style="font-size: 24pt; font-weight: 200; color: #1a1a1a;">04</p>
      <div>
        <p style="font-size: 13pt; font-weight: 500; color: #1a1a1a; margin-bottom: 4pt;">개방</p>
        <p style="font-size: 9pt; color: #888888; line-height: 1.5;">오픈소스와 커뮤니티 중심의 발전</p>
      </div>
    </div>

    <div style="background: #fafaf8; border-radius: 8pt; padding: 18pt; display: flex; flex-direction: column; justify-content: space-between;">
      <p style="font-size: 24pt; font-weight: 200; color: #1a1a1a;">05</p>
      <div>
        <p style="font-size: 13pt; font-weight: 500; color: #1a1a1a; margin-bottom: 4pt;">존중</p>
        <p style="font-size: 9pt; color: #888888; line-height: 1.5;">사용자의 프라이버시와 데이터 주권</p>
      </div>
    </div>

    <div style="background: #fafaf8; border-radius: 8pt; padding: 18pt; display: flex; flex-direction: column; justify-content: space-between;">
      <p style="font-size: 24pt; font-weight: 200; color: #1a1a1a;">06</p>
      <div>
        <p style="font-size: 13pt; font-weight: 500; color: #1a1a1a; margin-bottom: 4pt;">즐거움</p>
        <p style="font-size: 9pt; color: #888888; line-height: 1.5;">개발 과정 자체가 게임처럼 재미있게</p>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div style="padding-top: 10pt; border-top: 1px solid #eeeeee;">
    <p style="font-size: 9pt; color: #bbbbbb;">가치가 일관될 때, 제품은 진정성을 갖는다</p>
  </div>
</body>
</html>
