<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 720pt;
      height: 405pt;
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #1a1a1a;
      padding: 48pt;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
  </style>
</head>
<body>
  <!-- Top accent -->
  <div style="width: 40pt; height: 3pt; background: #ffffff; border-radius: 2pt;"></div>

  <!-- Center message -->
  <div>
    <p style="font-size: 42pt; font-weight: 200; color: #ffffff; letter-spacing: -0.02em; line-height: 1.3;">
      기술은 사라져야 합니다.
    </p>
    <p style="font-size: 42pt; font-weight: 200; color: #ffffff; letter-spacing: -0.02em; line-height: 1.3;">
      남는 것은 <b>경험</b>뿐.
    </p>
    <p style="font-size: 14pt; color: #666666; margin-top: 24pt; font-weight: 300; line-height: 1.6; max-width: 400pt;">
      HyperClaw는 AI 에이전트 오케스트레이션의 복잡성을 하나의 직관적인 경험으로 바꿉니다.
    </p>
  </div>

  <!-- Footer -->
  <div style="display: flex; justify-content: space-between; align-items: flex-end;">
    <div>
      <p style="font-size: 9pt; color: #555555; margin-bottom: 4pt;">OPEN SOURCE</p>
      <p style="font-size: 11pt; color: #888888;">HyperClaw</p>
    </div>
    <p style="font-size: 9pt; color: #555555;">Thank you.</p>
  </div>
</body>
</html>
