<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 720pt;
      height: 405pt;
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #ffffff;
      padding: 40pt 48pt;
      display: flex;
      flex-direction: column;
    }
  </style>
</head>
<body>
  <!-- Header -->
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24pt;">
    <div style="display: flex; align-items: center; gap: 12pt;">
      <p style="font-size: 10pt; font-weight: 500; color: #bbbbbb;">05</p>
      <h2 style="font-size: 22pt; font-weight: 400; color: #1a1a1a;">인간 중심 인터페이스</h2>
    </div>
    <p style="font-size: 10pt; color: #cccccc;">07</p>
  </div>

  <!-- Content -->
  <div style="flex: 1; display: flex; flex-direction: column; gap: 16pt;">
    <!-- Principle 1 -->
    <div style="display: grid; grid-template-columns: 80pt 1fr; gap: 20pt; padding: 16pt 0; border-bottom: 1px solid #f0f0ec;">
      <div>
        <p style="font-size: 28pt; font-weight: 200; color: #1a1a1a;">01</p>
      </div>
      <div>
        <p style="font-size: 15pt; font-weight: 500; color: #1a1a1a; margin-bottom: 6pt;">메타포를 통한 이해</p>
        <p style="font-size: 11pt; color: #888888; line-height: 1.6;">오피스, CEO, 팀장, 팀원이라는 친숙한 조직 구조를 통해 AI 오케스트레이션의 복잡한 개념을 직관적으로 전달합니다.</p>
      </div>
    </div>

    <!-- Principle 2 -->
    <div style="display: grid; grid-template-columns: 80pt 1fr; gap: 20pt; padding: 16pt 0; border-bottom: 1px solid #f0f0ec;">
      <div>
        <p style="font-size: 28pt; font-weight: 200; color: #1a1a1a;">02</p>
      </div>
      <div>
        <p style="font-size: 15pt; font-weight: 500; color: #1a1a1a; margin-bottom: 6pt;">감정을 가진 에이전트</p>
        <p style="font-size: 11pt; color: #888888; line-height: 1.6;">각 에이전트에 실존 인물의 성격을 부여하여, 단순한 프로세스가 아닌 살아있는 팀처럼 느끼게 합니다.</p>
      </div>
    </div>

    <!-- Principle 3 -->
    <div style="display: grid; grid-template-columns: 80pt 1fr; gap: 20pt; padding: 16pt 0;">
      <div>
        <p style="font-size: 28pt; font-weight: 200; color: #1a1a1a;">03</p>
      </div>
      <div>
        <p style="font-size: 15pt; font-weight: 500; color: #1a1a1a; margin-bottom: 6pt;">시각적 피드백</p>
        <p style="font-size: 11pt; color: #888888; line-height: 1.6;">픽셀아트 애니메이션으로 에이전트의 상태를 실시간으로 보여줍니다. 일하고, 쉬고, 회의하고, 지치는 모습까지.</p>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div style="padding-top: 12pt; border-top: 1px solid #eeeeee;">
    <p style="font-size: 9pt; color: #bbbbbb;">사람이 이해할 수 있는 언어로 기술을 번역한다</p>
  </div>
</body>
</html>
