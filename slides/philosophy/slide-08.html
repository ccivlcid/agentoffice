<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 720pt;
      height: 405pt;
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #fafaf8;
      padding: 40pt 48pt;
      display: flex;
      flex-direction: column;
    }
  </style>
</head>
<body>
  <!-- Header -->
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 28pt;">
    <div style="display: flex; align-items: center; gap: 12pt;">
      <p style="font-size: 10pt; font-weight: 500; color: #bbbbbb;">06</p>
      <h2 style="font-size: 22pt; font-weight: 400; color: #1a1a1a;">모든 개발자가 CEO가 되는 세상</h2>
    </div>
    <p style="font-size: 10pt; color: #cccccc;">08</p>
  </div>

  <!-- Vision statement -->
  <div style="flex: 1; display: flex; flex-direction: column; justify-content: center;">
    <div style="margin-bottom: 32pt;">
      <p style="font-size: 20pt; font-weight: 300; color: #1a1a1a; line-height: 1.6;">
        혼자서도 팀을 이끌 수 있다면,
      </p>
      <p style="font-size: 20pt; font-weight: 300; color: #1a1a1a; line-height: 1.6;">
        모든 아이디어는 현실이 됩니다.
      </p>
    </div>

    <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 16pt;">
      <div style="background: #ffffff; border-radius: 8pt; padding: 20pt; border: 1px solid #ebebeb;">
        <p style="font-size: 9pt; color: #999999; letter-spacing: 0.04em; margin-bottom: 10pt;">BEFORE</p>
        <p style="font-size: 12pt; color: #1a1a1a; line-height: 1.5;">
          아이디어 하나에 기획자, 디자이너, 개발자, QA가 필요
        </p>
      </div>
      <div style="display: flex; align-items: center; justify-content: center;">
        <p style="font-size: 24pt; color: #cccccc; font-weight: 200;">→</p>
      </div>
      <div style="background: #1a1a1a; border-radius: 8pt; padding: 20pt;">
        <p style="font-size: 9pt; color: #666666; letter-spacing: 0.04em; margin-bottom: 10pt;">AFTER</p>
        <p style="font-size: 12pt; color: #ffffff; line-height: 1.5;">
          당신이 CEO, AI가 당신의 팀. 아이디어에서 제품까지.
        </p>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div style="padding-top: 12pt; border-top: 1px solid #e8e8e4;">
    <p style="font-size: 9pt; color: #bbbbbb;">개인의 한계를 팀의 가능성으로</p>
  </div>
</body>
</html>
