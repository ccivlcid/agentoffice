<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 720pt;
      height: 405pt;
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #fafaf8;
      padding: 48pt;
      display: grid;
      grid-template-columns: 1fr 1.6fr;
      gap: 48pt;
    }
  </style>
</head>
<body>
  <!-- Left: Title -->
  <div style="display: flex; flex-direction: column; justify-content: flex-end;">
    <p style="font-size: 9pt; color: #999999; margin-bottom: 16pt; letter-spacing: 0.06em;">CONTENTS</p>
    <h1 style="font-size: 40pt; font-weight: 300; color: #1a1a1a; letter-spacing: -0.02em; line-height: 1.15;">
      우리가 믿는 것들
    </h1>
  </div>

  <!-- Right: Contents List -->
  <div style="display: flex; flex-direction: column; justify-content: center; gap: 10pt;">
    <div style="display: flex; align-items: center; gap: 16pt; padding: 12pt 0; border-bottom: 1px solid #e8e8e4;">
      <p style="font-size: 10pt; font-weight: 500; color: #bbbbbb; min-width: 20pt;">01</p>
      <p style="flex: 1; font-size: 14pt; font-weight: 500; color: #1a1a1a;">AI는 도구가 아니라 동료다</p>
    </div>
    <div style="display: flex; align-items: center; gap: 16pt; padding: 12pt 0; border-bottom: 1px solid #e8e8e4;">
      <p style="font-size: 10pt; font-weight: 500; color: #bbbbbb; min-width: 20pt;">02</p>
      <p style="flex: 1; font-size: 14pt; font-weight: 500; color: #1a1a1a;">오케스트레이션의 미학</p>
    </div>
    <div style="display: flex; align-items: center; gap: 16pt; padding: 12pt 0; border-bottom: 1px solid #e8e8e4;">
      <p style="font-size: 10pt; font-weight: 500; color: #bbbbbb; min-width: 20pt;">03</p>
      <p style="flex: 1; font-size: 14pt; font-weight: 500; color: #1a1a1a;">로컬 퍼스트, 프라이버시 퍼스트</p>
    </div>
    <div style="display: flex; align-items: center; gap: 16pt; padding: 12pt 0; border-bottom: 1px solid #e8e8e4;">
      <p style="font-size: 10pt; font-weight: 500; color: #bbbbbb; min-width: 20pt;">04</p>
      <p style="flex: 1; font-size: 14pt; font-weight: 500; color: #1a1a1a;">보이지 않는 복잡성</p>
    </div>
    <div style="display: flex; align-items: center; gap: 16pt; padding: 12pt 0; border-bottom: 1px solid #e8e8e4;">
      <p style="font-size: 10pt; font-weight: 500; color: #bbbbbb; min-width: 20pt;">05</p>
      <p style="flex: 1; font-size: 14pt; font-weight: 500; color: #1a1a1a;">인간 중심 인터페이스</p>
    </div>
    <div style="display: flex; align-items: center; gap: 16pt; padding: 12pt 0; border-bottom: 1px solid #e8e8e4;">
      <p style="font-size: 10pt; font-weight: 500; color: #bbbbbb; min-width: 20pt;">06</p>
      <p style="flex: 1; font-size: 14pt; font-weight: 500; color: #1a1a1a;">모든 개발자가 CEO가 되는 세상</p>
    </div>
    <div style="display: flex; align-items: center; gap: 16pt; padding: 12pt 0;">
      <p style="font-size: 10pt; font-weight: 500; color: #bbbbbb; min-width: 20pt;">07</p>
      <p style="flex: 1; font-size: 14pt; font-weight: 500; color: #1a1a1a;">핵심 가치</p>
    </div>
  </div>
</body>
</html>
