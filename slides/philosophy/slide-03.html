<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 720pt;
      height: 405pt;
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #1a1a1a;
      padding: 40pt 48pt;
      display: flex;
      flex-direction: column;
    }
  </style>
</head>
<body>
  <!-- Header -->
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 32pt;">
    <div style="display: flex; align-items: center; gap: 12pt;">
      <p style="font-size: 10pt; font-weight: 500; color: #555555;">01</p>
      <h2 style="font-size: 22pt; font-weight: 400; color: #ffffff;">AI는 도구가 아니라 동료다</h2>
    </div>
    <p style="font-size: 10pt; color: #444444;">03</p>
  </div>

  <!-- Quote block -->
  <div style="flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 0 24pt;">
    <div style="border-left: 2px solid #ffffff; padding-left: 28pt; margin-bottom: 32pt;">
      <p style="font-size: 26pt; font-weight: 300; color: #ffffff; line-height: 1.5; letter-spacing: -0.01em;">
        우리는 AI를 부리는 것이 아니라
      </p>
      <p style="font-size: 26pt; font-weight: 300; color: #ffffff; line-height: 1.5; letter-spacing: -0.01em;">
        AI와 <b>함께 생각</b>합니다.
      </p>
    </div>

    <p style="font-size: 13pt; color: #777777; line-height: 1.7; max-width: 480pt;">
      HyperClaw의 AI 에이전트는 명령을 기다리는 기계가 아닙니다. 각자의 성격과 전문성을 가진 팀원으로서, 스스로 판단하고 협업하며 최선의 결과물을 만들어냅니다.
    </p>
  </div>

  <!-- Bottom stats -->
  <div style="display: flex; gap: 48pt; padding-top: 16pt; border-top: 1px solid #333333;">
    <div>
      <p style="font-size: 28pt; font-weight: 300; color: #ffffff;">6</p>
      <p style="font-size: 9pt; color: #666666; margin-top: 2pt;">AI 프로바이더</p>
    </div>
    <div>
      <p style="font-size: 28pt; font-weight: 300; color: #ffffff;">∞</p>
      <p style="font-size: 9pt; color: #666666; margin-top: 2pt;">성격 조합</p>
    </div>
    <div>
      <p style="font-size: 28pt; font-weight: 300; color: #ffffff;">1</p>
      <p style="font-size: 9pt; color: #666666; margin-top: 2pt;">공통 목표</p>
    </div>
  </div>
</body>
</html>
