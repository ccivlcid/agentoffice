<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 720pt;
      height: 405pt;
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #fafaf8;
      padding: 40pt 48pt;
      display: flex;
      flex-direction: column;
    }
  </style>
</head>
<body>
  <!-- Header -->
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24pt;">
    <div style="display: flex; align-items: center; gap: 12pt;">
      <p style="font-size: 10pt; font-weight: 500; color: #bbbbbb;">03</p>
      <h2 style="font-size: 22pt; font-weight: 400; color: #1a1a1a;">로컬 퍼스트, 프라이버시 퍼스트</h2>
    </div>
    <p style="font-size: 10pt; color: #cccccc;">05</p>
  </div>

  <!-- Content: Two principles -->
  <div style="flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 24pt;">
    <!-- Left: Local First -->
    <div style="background: #ffffff; border-radius: 10pt; padding: 24pt; border: 1px solid #ebebeb; display: flex; flex-direction: column; justify-content: space-between;">
      <div>
        <p style="font-size: 32pt; font-weight: 200; color: #1a1a1a; margin-bottom: 16pt;">Local</p>
        <p style="font-size: 12pt; color: #666666; line-height: 1.7;">
          당신의 코드는 당신의 컴퓨터에서 실행됩니다. 클라우드 의존성 없이, 당신의 환경에서 완전한 통제권을 갖습니다.
        </p>
      </div>
      <div style="margin-top: 20pt;">
        <p style="font-size: 9pt; color: #999999; letter-spacing: 0.04em;">NO CLOUD DEPENDENCY</p>
      </div>
    </div>

    <!-- Right: Privacy First -->
    <div style="background: #ffffff; border-radius: 10pt; padding: 24pt; border: 1px solid #ebebeb; display: flex; flex-direction: column; justify-content: space-between;">
      <div>
        <p style="font-size: 32pt; font-weight: 200; color: #1a1a1a; margin-bottom: 16pt;">Private</p>
        <p style="font-size: 12pt; color: #666666; line-height: 1.7;">
          API 키는 AES-256-GCM으로 암호화됩니다. 사용자 데이터는 외부로 전송되지 않으며, 모든 결정은 로컬에서 이루어집니다.
        </p>
      </div>
      <div style="margin-top: 20pt;">
        <p style="font-size: 9pt; color: #999999; letter-spacing: 0.04em;">AES-256-GCM ENCRYPTION</p>
      </div>
    </div>
  </div>

  <!-- Bottom quote -->
  <div style="padding-top: 16pt; border-top: 1px solid #e8e8e4;">
    <p style="font-size: 11pt; color: #888888; font-weight: 300; font-style: italic;">
      "신뢰는 통제에서 온다. 당신의 데이터, 당신의 규칙."
    </p>
  </div>
</body>
</html>
