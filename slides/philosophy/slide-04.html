<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 720pt;
      height: 405pt;
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #ffffff;
      padding: 40pt 48pt;
      display: flex;
      flex-direction: column;
    }
  </style>
</head>
<body>
  <!-- Header -->
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24pt;">
    <div style="display: flex; align-items: center; gap: 12pt;">
      <p style="font-size: 10pt; font-weight: 500; color: #bbbbbb;">02</p>
      <h2 style="font-size: 22pt; font-weight: 400; color: #1a1a1a;">오케스트레이션의 미학</h2>
    </div>
    <p style="font-size: 10pt; color: #cccccc;">04</p>
  </div>

  <!-- Content -->
  <div style="flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 20pt;">
    <!-- Left: Concept -->
    <div style="display: flex; flex-direction: column; justify-content: center;">
      <p style="font-size: 13pt; color: #666666; line-height: 1.8; margin-bottom: 20pt;">
        하나의 AI가 모든 것을 하는 것보다, 여러 AI가 자신의 역할에 집중할 때 더 나은 결과가 나옵니다.
      </p>
      <p style="font-size: 13pt; color: #666666; line-height: 1.8;">
        오케스트라의 지휘자처럼, CEO는 각 에이전트의 강점을 조화시켜 하나의 완성된 작품을 만듭니다.
      </p>
    </div>

    <!-- Right: Visual metaphor -->
    <div style="display: flex; flex-direction: column; gap: 10pt; justify-content: center;">
      <div style="background: #f5f5f0; border-radius: 8pt; padding: 16pt 20pt;">
        <p style="font-size: 9pt; color: #999999; letter-spacing: 0.04em; margin-bottom: 6pt;">CONDUCTOR</p>
        <p style="font-size: 14pt; font-weight: 500; color: #1a1a1a;">CEO</p>
        <p style="font-size: 10pt; color: #888888; margin-top: 4pt;">전체 방향과 우선순위 결정</p>
      </div>
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10pt;">
        <div style="background: #f5f5f0; border-radius: 8pt; padding: 14pt 16pt;">
          <p style="font-size: 9pt; color: #999999; letter-spacing: 0.04em; margin-bottom: 4pt;">기획</p>
          <p style="font-size: 11pt; font-weight: 500; color: #1a1a1a;">전략 설계</p>
        </div>
        <div style="background: #f5f5f0; border-radius: 8pt; padding: 14pt 16pt;">
          <p style="font-size: 9pt; color: #999999; letter-spacing: 0.04em; margin-bottom: 4pt;">디자인</p>
          <p style="font-size: 11pt; font-weight: 500; color: #1a1a1a;">경험 창조</p>
        </div>
        <div style="background: #f5f5f0; border-radius: 8pt; padding: 14pt 16pt;">
          <p style="font-size: 9pt; color: #999999; letter-spacing: 0.04em; margin-bottom: 4pt;">개발</p>
          <p style="font-size: 11pt; font-weight: 500; color: #1a1a1a;">구현 실행</p>
        </div>
        <div style="background: #f5f5f0; border-radius: 8pt; padding: 14pt 16pt;">
          <p style="font-size: 9pt; color: #999999; letter-spacing: 0.04em; margin-bottom: 4pt;">QA</p>
          <p style="font-size: 11pt; font-weight: 500; color: #1a1a1a;">품질 보장</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div style="padding-top: 12pt; border-top: 1px solid #eeeeee;">
    <p style="font-size: 9pt; color: #bbbbbb;">각자의 역할에 집중할 때, 전체가 빛난다</p>
  </div>
</body>
</html>
